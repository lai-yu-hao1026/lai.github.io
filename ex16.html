<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hello World Styles</title>
  <style>
    body {
      background-color: black;
      font-family: "Times New Roman", serif;
    }

    .container {
      width: 650px;
      margin: 40px auto;
      background-color: #e6e6e6;
      padding: 20px;
    }

    .box {
      margin-bottom: 25px;
      padding: 10px;
      font-size: 40px;
      font-weight: bold;
    }

    /* First box */
    .box1 {
      background-color: #a9c3cf;
      border: 8px double #ff5a3c;
      outline: 4px solid #ff5a3c;
    }

    /* Second box */
    .box2 {
      background-color: yellow;
      border: 3px solid #2e86ff;
      border-radius: 12px;
    }

    /* Third box */
    .box3 {
      background-color: #5fae84;
      border: 8px dotted #8c8c8c;
      color: black;
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="box box1">Hello World</div>
    <div class="box box2">Hello World</div>
    <div class="box box3">Hello World</div>
  </div>

</body>
</html>
